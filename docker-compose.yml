# Local PostgreSQL for running the app. Run: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: strata
    ports:
      - "5432:5432"
    volumes:
      - strata_pg_data:/var/lib/postgresql/data

volumes:
  strata_pg_data: {}
